# ─────────────────────────────────────────────────────────────────
# Docker profile — overrides defaults in application.properties
# Activated automatically when SPRING_PROFILES_ACTIVE=docker
# ─────────────────────────────────────────────────────────────────

# ── DataSource (MySQL container) ──────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/campusmarket?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:campususer}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:campuspassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── H2 console off in Docker ──────────────────────────────────────
spring.h2.console.enabled=false

# ── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# ── JWT ───────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:UniMarketSecretKey2024VeryLongSecretKeyForJWTSigningWithHS256Algorithm}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# ── CORS ──────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost,http://localhost:80,http://frontend,http://localhost:5173,http://localhost:3000

# ── File uploads ──────────────────────────────────────────────────
upload.dir=${UPLOAD_DIR:/app/uploads}

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.marketplace=INFO
logging.level.org.springframework.security=WARN
