# Server
server.port=8080

# Database
spring.datasource.url=jdbc:h2:file:./data/student_marketplace;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.sql.init.mode=always
spring.jpa.open-in-view=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# JWT
app.jwt.secret=UniMarketSecretKey2024VeryLongSecretKeyForJWTSigningWithHS256Algorithm
app.jwt.expiration=86400000

# File Upload (Cloudinary)
cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.marketplace=DEBUG
logging.level.org.springframework.security=WARN
